name: SmartCharge
options:
  bundleIdPrefix: com.smartcharge
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SmartCharge:
    type: application
    platform: macOS
    sources:
      - path: SmartCharge
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartcharge.app
        INFOPLIST_FILE: SmartCharge/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartCharge/SmartCharge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        # Menu bar only — no Dock icon
        LSUIElement: true
    dependencies:
      - target: SmartChargeHelper

  SmartChargeHelper:
    type: tool
    platform: macOS
    sources:
      - path: SmartChargeHelper
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartcharge.helper
        INFOPLIST_FILE: SmartChargeHelper/Info.plist
        SKIP_INSTALL: "YES"
    postBuildScripts:
      - name: "Copy Helper to App Bundle"
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/SmartCharge.app/Contents/Library/LaunchServices"
          cp "${BUILT_PRODUCTS_DIR}/SmartChargeHelper" "${BUILT_PRODUCTS_DIR}/SmartCharge.app/Contents/Library/LaunchServices/com.smartcharge.helper"
